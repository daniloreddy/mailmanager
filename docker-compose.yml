services:
  mailmanager:
    image: ghcr.io/daniloreddy/mailmanager:latest
    container_name: mailmanager
    restart: unless-stopped
    ports:
      - "${HOST:-127.0.0.1}:${PORT:-8080}:${PORT:-8080}"  # HOST=0.0.0.0 per LAN / reverse proxy / esposizione diretta
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=${TZ:-UTC}
      - PORT=${PORT:-8080}
      - ENV_FILE=/app/hostcfg/.env
      - NICEGUI_STORAGE_PATH=/app/data/.nicegui
    volumes:
      - .:/app/hostcfg
      - ./data:/app/data
