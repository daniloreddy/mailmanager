services:
  mailmanager:
    # image: ghcr.io/daniloreddy/mailmanager:main
    build: .
    container_name: candle-graph
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - SPAMASSASSIN_HOST=spamassassin
      # - MAILMANAGER_API_KEY=changeme
      # - MAILMANAGER_PORT=8080